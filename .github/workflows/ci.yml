name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e .

      - name: Import test
        run: python -c "from teams_mcp import __version__; print(f'teams-mcp v{__version__}')"

      - name: Module entry point test
        run: python -c "from teams_mcp.server import mcp; print(f'Tools: {len(mcp._tool_manager._tools)}')"
