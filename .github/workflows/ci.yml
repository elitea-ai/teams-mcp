name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/

      - name: Type check
        run: uv run pyright src/

      - name: Import test
        run: uv run python -c "from mcp_server_teams import __version__; print(f'mcp-server-teams v{__version__}')"

      - name: Module entry point test
        run: uv run python -c "from mcp_server_teams.server import mcp; print(f'Tools registered: {len(mcp._tool_manager._tools)}')"

      - name: Run tests
        run: uv run pytest
